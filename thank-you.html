<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Thank You | Diana Packaged Drinking Water</title>

<meta name="description"
content="Thank you for contacting Diana Packaged Drinking Water. Your enquiry has been received successfully.">

<meta name="robots"
      content="noindex">

<link rel="icon"
      href="images/favicon.png">

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

font-family:"Libre Franklin",sans-serif;

background:
radial-gradient(circle at top right,
rgba(56,199,245,.16),
transparent 35%),

radial-gradient(circle at bottom left,
rgba(13,110,253,.12),
transparent 35%),

linear-gradient(
180deg,
#ffffff,
#f8fcff,
#edf8ff);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

overflow:hidden;

position:relative;

color:#2E4057;

}

.hero-bg{

    position:absolute;

    inset:0;

    overflow:hidden;

    z-index:0;

}

.circle{

    position:absolute;

    border-radius:50%;

    filter:blur(90px);

    opacity:.45;

}

.circle1{

    width:500px;

    height:500px;

    background:#DDF4FF;

    top:-180px;

    right:-250px;

}

.circle2{

    width:380px;

    height:380px;

    background:#EAF8FF;

    bottom:-150px;

    left:-120px;

}

.circle3{

    width:260px;

    height:260px;

    background:#F2FBFF;

    top:40%;

    left:48%;

    transform:translate(-50%,-50%);

}

.wave{

    position:absolute;

    width:140%;

    height:180px;

    left:-20%;

    border-radius:50%;

    background:rgba(56,199,245,.08);

}

.wave1{

    bottom:-90px;

}

.wave2{

    bottom:-130px;

    opacity:.45;

}

.bubble{

    position:absolute;

    border-radius:50%;

    background:rgba(56,199,245,.18);

    backdrop-filter:blur(5px);

}

.bubble1{

    width:16px;

    height:16px;

    left:15%;

    top:20%;

}

.bubble2{

    width:24px;

    height:24px;

    right:18%;

    top:30%;

}

.bubble3{

    width:12px;

    height:12px;

    left:30%;

    bottom:20%;

}

.bubble4{

    width:20px;

    height:20px;

    right:32%;

    bottom:12%;

}

.card{

width:min(650px,100%);

background:#fff;

border-radius:34px;

padding:60px 45px;

text-align:center;

box-shadow:
0 30px 80px rgba(15,60,110,.10);

opacity:0;

transform:translateY(40px);

animation:cardReveal .9s cubic-bezier(.22,1,.36,1) forwards;

position:relative;

z-index:5;

}
.logo{

width:130px;

margin:0 auto 28px;

display:block;

opacity:0;

animation:fadeIn .9s forwards .15s;

transition:transform .35s ease;

}

.logo:hover{

transform:scale(1.04);

}

.success-icon{

width:92px;
height:92px;

margin:0 auto 32px;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(
135deg,
#0D6EFD,
#38C7F5);

color:#fff;

font-size:42px;

box-shadow:
0 18px 45px rgba(13,110,253,.25);

opacity:0;

animation:
iconPop .8s cubic-bezier(.34,1.56,.64,1) forwards .35s,
floatIcon 4s ease-in-out infinite 1.3s;

}

h1{

font-family:"Manrope",sans-serif;

font-size:44px;

font-weight:800;

color:#163A6B;

margin-bottom:20px;

opacity:0;

animation:fadeUp .7s forwards .55s;

}

.message{

font-size:17px;

line-height:1.9;

color:#6F7D90;

margin-bottom:42px;

opacity:0;

animation:fadeUp .7s forwards .75s;

}

.message strong{

color:#163A6B;

font-weight:700;

}

.buttons{

display:flex;

justify-content:center;

gap:18px;

flex-wrap:wrap;

opacity:0;

animation:fadeUp .7s forwards .95s;

}

.btn{

display:inline-flex;

justify-content:center;

align-items:center;

gap:10px;

min-width:220px;

height:58px;

padding:0 30px;

border-radius:999px;

text-decoration:none;

font-weight:600;

font-size:15px;

transition:
transform .35s ease,
box-shadow .35s ease,
background .35s ease;

}

.btn i{

font-size:17px;

}

.primary{

color:#fff;

background:linear-gradient(
135deg,
#0D6EFD,
#38C7F5);

box-shadow:
0 18px 42px rgba(13,110,253,.22);

}

.primary:hover{

transform:translateY(-5px);

box-shadow:
0 24px 50px rgba(13,110,253,.30);

}

.secondary{

background:#fff;

color:#163A6B;

border:2px solid rgba(13,110,253,.16);

box-shadow:
0 14px 30px rgba(30,55,90,.08);

}

.secondary:hover{

transform:translateY(-5px);

border-color:#0D6EFD;

box-shadow:
0 20px 42px rgba(30,55,90,.12);

}

.note{

margin-top:36px;

font-size:15px;

color:#7A8798;

line-height:1.8;

opacity:0;

animation:fadeUp .7s forwards 1.1s;

}

.note a{

color:#0D6EFD;

font-weight:700;

text-decoration:none;

transition:.3s;

}

.note a:hover{

color:#38C7F5;

}
/*==========================
ANIMATIONS
==========================*/

@keyframes cardReveal{

    to{

        opacity:1;
        transform:translateY(0);

    }

}

@keyframes fadeIn{

    to{

        opacity:1;

    }

}

@keyframes fadeUp{

    from{

        opacity:0;
        transform:translateY(18px);

    }

    to{

        opacity:1;
        transform:translateY(0);

    }

}

@keyframes iconPop{

    0%{

        opacity:0;
        transform:scale(.5) rotate(-15deg);

    }

    70%{

        opacity:1;
        transform:scale(1.08);

    }

    100%{

        opacity:1;
        transform:scale(1);

    }

}

@keyframes floatIcon{

    0%,100%{

        transform:translateY(0);

    }

    50%{

        transform:translateY(-6px);

    }

}

/*==========================
RESPONSIVE
==========================*/

@media(max-width:768px){

    body{

        padding:22px;

    }

    .card{

        padding:48px 28px;

        border-radius:28px;

    }

    .logo{

        width:110px;

        margin-bottom:24px;

    }

    .success-icon{

        width:82px;
        height:82px;

        font-size:38px;

        margin-bottom:28px;

    }

    h1{

        font-size:34px;

    }

    .message{

        font-size:16px;

        margin-bottom:34px;

    }

    .buttons{

        flex-direction:column;

        align-items:center;

        gap:16px;

    }

    .btn{

        width:100%;

        max-width:320px;

    }

}

</style>

</head>

<body>

<div class="hero-bg">

    <div class="circle circle1"></div>

    <div class="circle circle2"></div>

    <div class="circle circle3"></div>

    <div class="wave wave1"></div>

    <div class="wave wave2"></div>

</div>

<div class="card">
    <a href="index.html" aria-label="Back to Home">

    <img
        src="images/logo.png"
        alt="Diana Packaged Drinking Water"
        class="logo">

</a>
<br>
<div class="success-icon">

    <i class="fa-solid fa-check"></i>

</div>

<h1>

    धन्यवाद

</h1>

<p class="message">

    We've successfully received your enquiry.

    Our team will review your request and get back to you as soon as possible.

</p>

<div class="buttons">

    <a
        href="https://wa.me/917795288098"
        target="_blank"
        class="btn primary">

        <i class="fab fa-whatsapp"></i>

        <span>Chat on WhatsApp</span>

    </a>

    <a
        href="index.html"
        class="btn secondary">

        <i class="fa-solid fa-house"></i>

        <span>Back to Home</span>

    </a>

</div>

<div class="note">
<br>
    Need immediate assistance?

<br>    

    <a href="tel:+917795288098">

        <i class="fa-solid fa-phone"></i>

        +91&nbsp;77952&nbsp;88098

    </a>

</div>

</div>

</body>

</html>
